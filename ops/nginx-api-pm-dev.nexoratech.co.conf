# Reference nginx vhost for the Go PM API STAGING server.
# Installed at /etc/nginx/sites-available/api-pm-dev.nexoratech.co on
# 212.85.25.165, symlinked into sites-enabled, then TLS added by
# `certbot --nginx -d api-pm-dev.nexoratech.co` (certbot rewrites this
# file in place to add the listen 443/ssl block + redirect).

server {
    listen 80;
    server_name api-pm-dev.nexoratech.co;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
