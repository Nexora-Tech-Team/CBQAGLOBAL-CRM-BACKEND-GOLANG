apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
  name: gurihmart-api-ingress
  namespace: staging
spec:
  rules:
    - host: staging-gurihmart-api.ptape.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gurihmart-api-service
                port:
                  number: 80
  # defaultBackend:
  #   service:
  #     name: http-to-https-redirect
  #     port:
  #       number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gurihmart-api-service
  namespace: staging
spec:
  ports:
    - port: 80
      targetPort: 4000
  selector:
    app: gurihmart-api-service
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gurihmart-api-service
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gurihmart-api-service
  template:
    metadata:
      labels:
        app: gurihmart-api-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - image: 'gcr.io/dev-nkc/gurihmart-api:latest'
          imagePullPolicy: Always
          name: gurihmart-api-service
          ports:
            - containerPort: 4000