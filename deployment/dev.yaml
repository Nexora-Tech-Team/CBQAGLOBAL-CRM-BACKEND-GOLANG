apiVersion: v1
kind: Service
metadata:
  name: gurihmart-api-dev-service
  namespace: staging
spec:
  ports:
    - port: 80
      targetPort: 4000
  selector:
    app: gurihmart-api-dev-service
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gurihmart-api-dev-service
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gurihmart-api-dev-service
  template:
    metadata:
      labels:
        app: gurihmart-api-dev-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - image: 'gcr.io/dev-nkc/gurihmart-api-dev:latest'
          imagePullPolicy: Always
          name: gurihmart-api-dev-service
          ports:
            - containerPort: 4000
